<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 6</title>
  </head>
  <body>
    <!-- Task 1 -->
    <form action="test.py" method="post">
      <div>
        <label for="username">Username:</label>
        <br />
        <input
          type="text"
          name="username"
          placeholder="Enter your username"
          required
        />
      </div>
      <hr />
      <div>
        <label for="password">Password:</label>
        <br />
        <input
          type="password"
          name="password"
          placeholder="Enter your password"
        />
      </div>
      <hr />
      <div>
        <label for="mobile">Mobile:</label>
        <br />
        <input
          type="tel"
          name="mobile"
          pattern="^\+\d{5}\s\(\d{3}\)\s\d{3}$"
          placeholder="Enter your mobile number (e.g., +20100 (234) 123)"
          size="45"
        />
      </div>
      <hr />
      <div>
        <label for="email">Email:</label>
        <br />
        <input
          type="email"
          name="email"
          placeholder="Enter your email"
          required
        />
      </div>
      <hr />
      <div>
        <label for="subject">Subject:</label>
        <br />
        <input type="text" name="subject" placeholder="Enter the subject" />
      </div>
      <hr />
      <input type="number" hidden value="3" />
      <div>
        <input type="reset" value="Empty Form" />
        <input type="submit" value="Send Data" />
      </div>
    </form>

    <!-- Task 2 -->
    <br />
    <hr />
    <br />
    <input
      type="range"
      min="100"
      max="1000"
      step="100"
      value="400"
      name="slider"
      title="Enter the value"
    />
  </body>
</html>
