<html>
  <head>
    <title>My First Page</title>

    <!-- task 4 -->
    <!--
  meta tag for describing the page content
  appears in search engine results under the title  
  -->
    <meta name="description" content="This is Description For My First Page" />
    <!--
  meta tag for telling the user that the content is copyrighted
  and owned by the company name written in content attribute
  -->
    <meta name="copyright" content="company name" />
    <!--
  meta tag for informing the user about the author of the page
  which is obvious from the name of the tag
  but important to be used in case of multiple authors
  -->
    <meta name="author" content="Mazen Momen" />
    <!--
  meta tag for controlling the viewport of the page
  making the width of the page equal to the width of the device
  and setting the initial zoom level to 1 
  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style></style>
    <script></script>
    <link rel="stylesheet" href="" />
  </head>
  <body>
    This Is My First Page
  </body>
</html>
